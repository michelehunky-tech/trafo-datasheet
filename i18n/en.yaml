tests:
  header: 'Routine tests IEC 60076-1:'
  winding_resistance: Measurement of winding resistance
  voltage_ratio: Measurement of voltage ratio and check of phase displacement
  sc_impedance_load_loss: Measurement of short-circuit impedance and load loss
  no_load_loss: Measurement of no-load loss and current
  dielectric_header: 'Dielectric routine tests:'
  av: Applied voltage test (AV)
  ivw: Induced voltage withstand test (IVW)
  ivpd: Induced voltage test with PD measurement (IVPD)
  auxw: Auxiliary wiring insulation test (AuxW) — only if present
  li: Full wave lightning impulse test for the line terminals (LI)
  ltac: Line terminal AC withstand voltage test (LTAC) — only for non-uniform insulation
  oltc: Tests on on-load tap-changers, where appropriate
  tightness: Leak testing with pressure for liquid-immersed transformers (tightness test)
  ct_check: Check of the ratio and polarity of built-in current transformers — only if present
  core_frame: Check of core and frame insulation for liquid immersed transformers with core or frame insulation
  zero_sequence: Measurement of zero-sequence impedance
  um_header: 'Additional routine tests (Um > 72.5 kV):'
  capacitances: Determination of capacitances windings-to-earth and between windings
  dc_insulation: Measurement of d.c. insulation resistance between each winding to earth and between windings
  tan_delta: Measurement of dissipation factor (tan δ) of the insulation system capacitances
  dga: Measurement of dissolved gases in dielectric liquid from each oil compartment
  no_load_90_110: Measurement of no-load loss and current at 90 % and 110 % of rated voltage
  earthing_note: ' — only for earthing transformer with secondary winding'
