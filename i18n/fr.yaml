  dga: Mesure des gaz dissous dans le liquide diélectrique de chaque compartiment d'huile
  no_load_90_110: Mesure des pertes et du courant à vide à 90 % et 110 % de la tension nominale
  earthing_note: ' — uniquement pour transformateur de mise à la terre avec enroulement secondaire'
