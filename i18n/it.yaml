tests:
  header: 'Prove di routine IEC 60076-1:'
  winding_resistance: Misura della resistenza degli avvolgimenti
  voltage_ratio: Misura del rapporto di trasformazione e verifica dello spostamento di fase
  sc_impedance_load_loss: Misura dell'impedenza di cortocircuito e delle perdite a carico
  no_load_loss: Misura delle perdite e della corrente a vuoto
  dielectric_header: 'Prove dielettriche di routine:'
  av: Prova di tensione applicata (AV)
  ivw: Prova di tensione indotta di tenuta (IVW)
  ivpd: Prova di tensione indotta con misura delle scariche parziali (IVPD)
  auxw: Prova di isolamento dei circuiti ausiliari (AuxW) — solo se presenti
  li: Prova di impulso atmosferico a onda piena sui terminali di linea (LI)
  ltac: Prova di tensione applicata sui terminali di linea (LTAC) — solo per isolamento non uniforme
  oltc: Prove sul commutatore sotto carico, ove applicabile
  tightness: Prova di tenuta in pressione per trasformatori in olio (tightness test)
  ct_check: Verifica del rapporto e della polarità dei TA incorporati — solo se presenti
  core_frame: Verifica dell'isolamento di nucleo e struttura per trasformatori in olio con isolamento di nucleo o struttura
  zero_sequence: Misura dell'impedenza omopolare
  um_header: 'Prove di routine aggiuntive (Um > 72,5 kV):'
  capacitances: Determinazione delle capacità avvolgimenti-terra e tra avvolgimenti
  dc_insulation: Misura della resistenza di isolamento in c.c. tra ciascun avvolgimento e terra e tra avvolgimenti
  tan_delta: Misura del fattore di dissipazione (tan δ) delle capacità del sistema di isolamento
  dga: Misura dei gas disciolti nel liquido dielettrico di ciascuno scomparto olio
  no_load_90_110: Misura delle perdite e della corrente a vuoto al 90 % e 110 % della tensione nominale
  earthing_note: ' — solo per trasformatore di terra con avvolgimento secondario'
  pd_measurement: Misura delle scariche parziali
