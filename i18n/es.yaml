  dielectric_header: 'Ensayos dieléctricos de rutina:'
  av: Ensayo de tensión aplicada (AV)
  ivw: Ensayo de tensión inducida de soportabilidad (IVW)
  ivpd: Ensayo de tensión inducida con medida de descargas parciales (IVPD)
  auxw: Ensayo de aislamiento del cableado auxiliar (AuxW) — solo si está presente
  li: Ensayo de impulso tipo rayo a onda plena en los terminales de línea (LI)
  ltac: Ensayo de tensión aplicada en los terminales de línea (LTAC) — solo para aislamiento no uniforme
  oltc: Ensayos del regulador en carga, cuando proceda
  tightness: Ensayo de estanqueidad con presión para transformadores en aceite (tightness test)
  ct_check: Verificación de la relación y polaridad de los TC incorporados — solo si están presentes
  core_frame: Verificación del aislamiento del núcleo y la estructura para transformadores en aceite con aislamiento de núcleo o estructura
  zero_sequence: Medida de la impedancia homopolar
  um_header: 'Ensayos de rutina adicionales (Um > 72,5 kV):'
  capacitances: Determinación de las capacidades devanados-tierra y entre devanados
  dc_insulation: Medida de la resistencia de aislamiento en c.c. entre cada devanado y tierra y entre devanados
  tan_delta: Medida del factor de disipación (tan δ) de las capacidades del sistema de aislamiento
  dga: Medida de los gases disueltos en el líquido dieléctrico de cada compartimento de aceite
  no_load_90_110: Medida de las pérdidas y de la corriente en vacío al 90 % y 110 % de la tensión nominal
  earthing_note: ' — solo para transformador de puesta a tierra con devanado secundario'
