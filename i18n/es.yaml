tests:
  header: 'Ensayos de rutina IEC 60076-1:'
  winding_resistance: Medida de la resistencia de los devanados
  voltage_ratio: Medida de la relación de transformación y verificación del desfase
  sc_impedance_load_loss: Medida de la impedancia de cortocircuito y de las pérdidas en carga
