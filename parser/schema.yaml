meta:
  sheet: Foglio1
  label_col: 1
  value_col: 2
  first_row: 2
  last_row: 73
  datasheet_language: en
  number_format:
    decimal: ','
    thousands: '.'
family_rules:
  _doc: 'Order: oil if ''Tipologia olio'' present; resin if Raffreddamento in air set; else oil.'
  air_cooling:
  - AN
  - AF
  - ANAF
  oil_prefix:
  - O
  - K
image_rules:
  _doc: family+casa+cooling -> image key
  resina:
    cabina_true: resin_enclosure
    cabina_false: resin_open
  olio:
    Ermetico: oil_hermetic
    Conservatore:
      Radiatori: oil_conservator_radiators
      Onde: oil_conservator_corrugated
suspicious:
  date_coerced_fields:
  - Classe isolamento MT
  - Classe isolamento BT
value_map:
  Tipo casa:
    Conservatore: Conservator
    Ermetico: Hermetically sealed
  Tipo sistema raffreddamento:
    Radiatori: Radiators
    Onde: Corrugated walls
  Tipo commutatore:
    Reg. sottocarico: On-load tap changer (OLTC)
    A vuoto: Off-circuit tap changer (DETC)
    Reg. a vuoto: Off-circuit tap changer (DETC)
    Nessuno: None
  Tipo avvolg. MT: &id001
    Strati: Layer
    Dischi: Disc
    Continuo: Continuous disc
    Elicoidale: Helical
    Bobine: Coil
    Inglobata: Cast (encapsulated)
    Impregnata: Impregnated
  Tipo avvolg. BT: *id001
  Tipo avvolg. ST: *id001
  Materiale MT: &id002
    Al: Aluminium
    Cu: Copper
  Materiale BT: *id002
  Materiale ST: *id002
